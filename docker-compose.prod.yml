# =============================================================
# Docker Compose — Producción Veterinaria (AWS Sandbox)
# =============================================================
# Se utiliza la imagen construida en GHCR en lugar de build local.

services:

  # -----------------------------------------------------------
  # Aplicación Laravel (PHP-FPM)
  # -----------------------------------------------------------
  app:
    image: ghcr.io/serbrigue/veterinaria:main
    container_name: vet_app_prod
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: production
      DB_HOST: mysql
      DB_PORT: 3306
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./.env:/var/www/.env
      # Compartimos la carpeta public generada en la imagen con Nginx
      - public_assets:/var/www/public
    networks:
      - vet_network

  # -----------------------------------------------------------
  # Servidor web (Nginx)
  # -----------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: vet_nginx_prod
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      # Montar la configuración personalizada
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      # Montar el volumen que recibe la carpeta public de la app
      - public_assets:/var/www/public
    depends_on:
      - app
    networks:
      - vet_network

  # -----------------------------------------------------------
  # Base de datos (MySQL 8.0)
  # -----------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: vet_mysql_prod
    restart: unless-stopped
    ports:
      - "3306:3306"
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_secret}
      MYSQL_DATABASE: ${DB_DATABASE:-veterinaria}
      MYSQL_USER: ${DB_USERNAME:-vet_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-vet_secret}
    volumes:
      - vet_mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-root_secret}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - vet_network

  # -----------------------------------------------------------
  # Caché (Redis)
  # -----------------------------------------------------------
  redis:
    image: redis:7.2-alpine
    container_name: vet_redis_prod
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - vet_redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secret}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vet_network

  # -----------------------------------------------------------
  # Worker de colas
  # -----------------------------------------------------------
  queue:
    image: ghcr.io/serbrigue/veterinaria:main
    container_name: vet_queue_prod
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: production
      DB_HOST: mysql
      DB_PORT: 3306
      REDIS_HOST: redis
      REDIS_PORT: 6379
    entrypoint: []
    command: >
      sh -c "sleep 15 && php artisan queue:work --verbose --tries=3 --timeout=90 --sleep=3 --max-jobs=500 --max-time=3600"
    depends_on:
      - app
      - mysql
      - redis
    volumes:
      - ./.env:/var/www/.env
    networks:
      - vet_network

# =============================================================
# Volúmenes
# =============================================================
volumes:
  vet_mysql_data:
  vet_redis_data:
  # Volumen para compartir assets entre app y nginx
  public_assets:

# =============================================================
# Red
# =============================================================
networks:
  vet_network:
    driver: bridge
