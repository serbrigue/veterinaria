server {

    #Archivo de configuración y preferencias en nginx

    #Directivas de configuración del servidor

    listen 80;
    server_name localhost;
    root /var/www/public;
    index index.php index.html;

    # Charset
    charset utf-8;

    # Logs
    access_log /var/log/nginx/veterinaria_access.log;
    error_log  /var/log/nginx/veterinaria_error.log;

    # Tamaño máximo de cuerpo de petición
    client_max_body_size 55M;

    # Regla principal: intentar archivo estático, luego delegar a index.php (Laravel)
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Archivos estáticos con caché largo
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Manejo de PHP via FastCGI -> PHP-FPM
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;          # Nombre del servicio PHP-FPM en docker-compose
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;

        # Timeouts
        fastcgi_connect_timeout 60s;
        fastcgi_send_timeout    120s;
        fastcgi_read_timeout    120s;
    }

    # Ocultar archivos sensibles
    location ~ /\.(?!well-known).* {
        deny all;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;
}
