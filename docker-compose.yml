# =============================================================
# Docker Compose — Veterinaria (Laravel 12 + Vue 3 + Inertia)
# =============================================================
# Servicios:
#   app       - PHP 8.2 FPM (Laravel)
#   nginx     - Servidor web (puerto 8080)
#   mysql     - Base de datos MySQL 8.0 (puerto 3307)
#   redis     - Caché y colas (puerto 6379)
#   queue     - Worker de colas Laravel
#   vite      - Servidor de desarrollo Vite/Node (puerto 5173)
# =============================================================

services:

  # -----------------------------------------------------------
  # PHP-FPM: Aplicación Laravel
  # -----------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        user: www
        uid: 1000
    container_name: vet_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-local}
      DB_HOST: mysql
      DB_PORT: 3306
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vet_network

  # -----------------------------------------------------------
  # Nginx: Servidor web
  # -----------------------------------------------------------
  nginx:
    image: nginx:1.25-alpine
    container_name: vet_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - vet_network

  # -----------------------------------------------------------
  # MySQL 8.0: Base de datos
  # -----------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: vet_mysql
    restart: unless-stopped
    ports:
      - "${DB_PORT:-3307}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_secret}
      MYSQL_DATABASE: ${DB_DATABASE:-veterinaria}
      MYSQL_USER: ${DB_USERNAME:-vet_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-vet_secret}
    volumes:
      - vet_mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-root_secret}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - vet_network

  # -----------------------------------------------------------
  # Redis: Caché y Queue
  # -----------------------------------------------------------
  redis:
    image: redis:7.2-alpine
    container_name: vet_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - vet_redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secret}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vet_network

  # -----------------------------------------------------------
  # Queue Worker: Worker de colas Laravel
  # -----------------------------------------------------------
  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      args:
        user: www
        uid: 1000
    container_name: vet_queue
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      REDIS_HOST: redis
      REDIS_PORT: 6379
    command: >
      sh -c "sleep 15 &&
             php artisan queue:work
             --verbose --tries=3 --timeout=90
             --sleep=3 --max-jobs=500 --max-time=3600"
    depends_on:
      - app
      - mysql
      - redis
    networks:
      - vet_network

  # -----------------------------------------------------------
  # Vite / Node: Servidor de desarrollo frontend
  # Solo se usa en desarrollo (profile: dev)
  # Ejecutar con: docker compose --profile dev up
  # -----------------------------------------------------------
  vite:
    image: node:20-alpine
    container_name: vet_vite
    restart: unless-stopped
    working_dir: /var/www
    ports:
      - "${VITE_PORT:-5173}:5173"
    volumes:
      - .:/var/www
      - vet_node_modules:/var/www/node_modules
    command: >
      sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    profiles:
      - dev
    networks:
      - vet_network

# =============================================================
# Volúmenes persistentes
# =============================================================
volumes:
  vet_mysql_data:
    driver: local
  vet_redis_data:
    driver: local
  vet_node_modules:
    driver: local

# =============================================================
# Red interna del ecosistema
# =============================================================
networks:
  vet_network:
    driver: bridge
